<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ORV v5.3.7</title><style>body{background:#0d0d1a;color:#eee;font-family:monospace;padding:6px;max-width:375px;margin:0 auto}#portrait{width:100%;border:2px solid #FFD700;margin-bottom:6px;display:block}.card{border:2px solid #FFD700;padding:10px;text-align:center;margin-bottom:6px;background:#1a1a2e}h3{margin:4px 0;font-size:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;margin:4px 0}button{background:#FFD700;color:#000;border:none;padding:10px;margin:3px 0;width:100%;font-size:14px}button:disabled{background:#444;color:#888}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin:6px 0}.tab{background:#2a2a3e;border:1px solid #444;padding:7px;text-align:center;font-size:12px}.tab.active{background:#FFD700;color:#000}.panel{display:none;min-height:280px}.panel.active{display:block}.log{border:1px solid #444;padding:6px;height:240px;overflow:auto;white-space:pre-wrap;font-size:12px;margin:6px 0}.row{display:flex;gap:3px}.row button{flex:1}.item{border:1px solid #333;padding:5px;margin:3px 0;font-size:12px}.small{font-size:11px;color:#aaa}.fable{border:1px solid #FFD700;padding:6px;margin:4px 0;background:#1a1a2e}.fable b{color:#FFD700}.buff{color:#0f0;font-size:11px}</style></head><body><h3>ORV: Tyrant King v5.3.7</h3><img id="portrait" src="https://i.imgur.com/placeholder.png" onerror="this.style.display='none'"><div class="card" onclick="dev()"><b>Yuki Amatsu</b><br><span class="small">Level <span id="lv">1</span> | Incarnation | Regression: <span id="reg">1</span>st</span><div class="stats"><div>HP: <span id="hp">100</span>/<span id="mhp">100</span></div><div>Coins: <span id="c">0</span></div><div>STR: <span id="str">1</span> <span id="fablestr" class="buff"></span></div><div>EXP: <span id="xp">0</span>/<span id="xm">100</span></div></div></div><button onclick="newGame()">New Game</button><button onclick="loadGame()">Load Game</button><div class="tabs"><div class="tab active" onclick="tab('story',this)">Story</div><div class="tab" onclick="tab('combat',this)">Combat</div><div class="tab" onclick="tab('up',this)">Upgrades</div><div class="tab" onclick="tab('inv',this)">Inventory</div><div class="tab" onclick="tab('shop',this)">Shop</div><div class="tab" onclick="tab('fable',this)">Fables</div></div><div id="story" class="panel active"><div class="log" id="log"></div><div id="choices"></div></div><div id="combat" class="panel"><div class="log" id="combatlog"></div><div id="combatchoices"></div></div><div id="up" class="panel"><div id="uplist"></div></div><div id="inv" class="panel"><div id="invlist"></div></div><div id="shop" class="panel"><div id="shoplist"></div></div><div id="fable" class="panel"><div id="fablelist"></div><div id="rellist"></div></div><script>const FABLE_BUFFS={'One Who Killed a Human':{str:2,desc:'+2 STR. You crossed the line. Combat comes easier.'},'First Ally':{mhp:20,desc:'+20 Max HP. Trust is armor.'},'Coward\'s Path':{agi:1,desc:'+1 AGI. You know when to run.'}};let g={hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},rel:{yerin:0,arin:0},f:[],sk:[],enemy:null,reg:1};function getBuff(s){let b={str:0,agi:0,int:0,vit:0,mhp:0};g.f.forEach(f=>{let fb=FABLE_BUFFS[f];if(fb){for(let k in fb)if(k!='desc')b[k]=(b[k]||0)+fb[k]}});return b[s]||0}function log(t,p='log'){let l=document.getElementById(p);l.innerText+=t+'\n';l.scrollTop=l.scrollHeight}function update(){let b=getBuff('str'),bm=getBuff('mhp');hp.innerText=g.hp;mhp.innerText=g.mhp+bm;c.innerText=g.c;str.innerText=g.str+(g.eq.w?g.eq.w.s:0);fablestr.innerText=b?`+${b}`:'';lv.innerText=g.lv;xp.innerText=g.xp;xm.innerText=g.xm;reg.innerText=g.reg;renderUp();renderInv();renderShop();renderFable()}function save(){localStorage.setItem('orv537',JSON.stringify(g))}function loadGame(){let d=localStorage.getItem('orv537')||localStorage.getItem('orv536')||localStorage.getItem('orv535')||localStorage.getItem('orv534');if(d){g=JSON.parse(d);g.c=g.c||0;g.xp=g.xp||0;g.reg=g.reg||1;log('Save loaded.');update();showScenario()}else{log('No save found. Tap New Game.')}}function newGame(){g={hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},rel:{yerin:0,arin:0},f:[],sk:[],enemy:null,reg:1};log('=== NEW GAME STARTED ===\nYou are Yuki Amatsu, Incarnation.');save();update();showScenario()}function tab(id,el){document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));el.classList.add('active');document.getElementById(id).classList.add('active')}function choices(...btns){let d=document.getElementById('choices');d.innerHTML='';btns.forEach(b=>{let el=document.createElement('button');el.innerText=b.t;el.onclick=b.f;if(b.dis)el.disabled=true;d.appendChild(el)})}function showScenario(){document.getElementById('combatlog').innerText='';if(g.sc==1&&g.cl==0){log('\n=== SCENARIO #1: SUBWAY ===\nThe lights die. Blue message:\n[Main Scenario #1 – Prove Your Worth]\nKill 1 living being. Reward: 500 Coins\n\nA thug with a box cutter approaches.\nSeo Yerin hides behind you.');choices({t:'[1] Charge the thug – Fight',f:()=>startCombat({n:'Subway Thug',hp:5,str:2,r:500,e:50})},{t:'[2] [INT 1] Look for weapon',f:()=>{g.inv.push({id:'pipe',n:'Rusted Pipe',s:2,c:25});log('Found Rusted Pipe! +2 STR auto-equipped.');g.eq.w=g.inv.pop();save();update();startCombat({n:'Subway Thug',hp:5,str:2})}},{t:'[3] Talk to Seo Yerin',f:()=>{g.rel.yerin=1;log('Seo Yerin: "P-please help..." [+1 Relationship]');save();update();startCombat({n:'Subway Thug',hp:5,str:2})}})}else if(g.sc==1&&g.cl==1){log('\nThe thug collapses. +500 coins. +50 EXP.\n[Fable Unlocked: One Who Killed a Human] +2 STR');if(!g.f.includes('One Who Killed a Human'))g.f.push('One Who Killed a Human');choices({t:'Continue to Scenario #2',f:()=>{g.sc=2;save();update();showScenario()}})}else if(g.sc==2&&g.cl==1){log('\n=== SCENARIO #2: PLATFORM CLEAR ===\nA slime blocks the stairs.\n\nArin Kosaka drops from the vent. "Dumbass. You almost got dissolved."');choices({t:'[1] "You\'re welcome." – Arin -1',f:()=>{g.rel.arin=-1;startCombat({n:'Subway Slime',hp:15,str:3,r:300,e:75})}},{t:'[2] [INT 2] "You were scouting." – Arin +2',f:()=>{if(g.int>=2){g.rel.arin=2;log('Arin: "...Tch. Fine. Vents lead to S3." [+2 Relationship]')}else{log('INT too low.');g.rel.arin=-1}save();update();startCombat({n:'Subway Slime',hp:15,str:3})}},{t:'[3] Gift Bandage – Arin +3',f:()=>{let i=g.inv.findIndex(x=>x.id=='bandage');if(i>-1){g.inv.splice(i,1);g.rel.arin=3;if(!g.f.includes('First Ally'))g.f.push('First Ally');log('Arin: "...You didn\'t have to." [+3 Relationship] [Fable: First Ally] +20 Max HP')}else{log('No Bandage to gift!');g.rel.arin=-1}save();update();startCombat({n:'Subway Slime',hp:15,str:3})}})}else if(g.sc==2&&g.cl==2){log('\nThe slime bursts. +300 coins. +75 EXP.\nS3 not in this build yet. You win!');choices({t:'New Game+',f:()=>newGame()})}}function startCombat(e){g.enemy=e;tab('combat',document.querySelectorAll('.tab')[1]);log(`\n--- COMBAT: ${e.n} ---`,'combatlog');combatLoop()}function combatLoop(){if(!g.enemy)return showScenario();let l=document.getElementById('combatlog');l.innerText+=`${g.enemy.n} HP: ${g.enemy.hp} | Your HP: ${g.hp}\n`;let d=document.getElementById('combatchoices');d.innerHTML='';[{t:'Attack',f:attack},{t:'Use Item',f:()=>tab('inv',document.querySelectorAll('.tab')[3])},{t:'Flee',f:flee}].forEach(b=>{let el=document.createElement('button');el.innerText=b.t;el.onclick=b.f;d.appendChild(el)})}function attack(){let b=getBuff('str'),bm=getBuff('mhp');let dmg=g.str+(g.eq.w?g.eq.w.s:0)+b+(window.pStrike?Math.floor(g.str*0.5):0);window.pStrike=0;g.enemy.hp-=dmg;log(`You deal ${dmg} damage.`,'combatlog');if(g.enemy.hp<=0){log(`${g.enemy.n} defeated! +${g.enemy.r}c +${g.enemy.e}XP`,'combatlog');g.c+=g.enemy.r;g.xp+=g.enemy.e;g.cl=g.sc;if(g.xp>=g.xm){g.lv++;g.str++;g.agi++;g.int++;g.vit++;g.mhp+=10;g.hp=g.mhp+bm;g.xp=0;g.xm=g.lv*100;log('LEVEL UP! All stats +1','combatlog')}g.enemy=null;save();update();setTimeout(()=>{tab('story',document.querySelectorAll('.tab')[0]);showScenario()},1000);return}let edmg=g.enemy.str;g.hp-=edmg;log(`${g.enemy.n} deals ${edmg} damage.`,'combatlog');if(g.hp<=0){log('YOU DIED. Lost 50% coins. Regression +1.','combatlog');g.c=Math.floor(g.c*0.5);g.hp=g.mhp=100;g.str=g.agi=g.int=g.vit=1;g.sc=1;g.cl=0;g.inv=[];g.eq={w:null};g.enemy=null;g.reg++;save();update();setTimeout(()=>{tab('story',document.querySelectorAll('.tab')[0]);showScenario()},1500);return}update()}function flee(){log('You fled combat. -50 coins penalty.','combatlog');g.c=Math.max(0,g.c-50);g.enemy=null;save();update();tab('story',document.querySelectorAll('.tab')[0]);showScenario()}function renderUp(){let cap=g.sc*5;let h='';['str','agi','int','vit'].forEach(s=>{let cost=100*Math.pow(2,g[s]-1);let max=g[s]>=cap;let b=getBuff(s);h+=`<div class="item">${s.toUpperCase()} ${g[s]}/${cap} ${b?`<span class="buff">+${b}</span>`:''}<br><button onclick="upgrade('${s}')" ${g.c<cost||max?'disabled':''}>Upgrade +1 (${cost}c)</button></div>`});
