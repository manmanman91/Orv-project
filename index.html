<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ORV v5.3.9</title>
<style>
body{background:#0d0d1a;color:#eee;font-family:monospace;padding:6px;max-width:375px;margin:0 auto}
#portrait{width:100%;border:2px solid #FFD700;margin-bottom:6px;display:block}
.card{border:2px solid #FFD700;padding:10px;text-align:center;margin-bottom:6px;background:#1a1a2e}
h3{margin:4px 0;font-size:16px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;margin:4px 0}
button{background:#FFD700;color:#000;border:none;padding:10px;margin:3px 0;width:100%;font-size:14px}
button:disabled{background:#444;color:#888}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin:6px 0}
.tab{background:#2a2a3e;border:1px solid #444;padding:7px;text-align:center;font-size:12px}
.tab.active{background:#FFD700;color:#000}
.panel{display:none;min-height:280px}
.panel.active{display:block}
.log{border:1px solid #444;padding:6px;height:240px;overflow:auto;white-space:pre-wrap;font-size:12px;margin:6px 0}
#error{color:#f00;padding:10px;border:1px solid #f00;margin:6px 0;display:none}
.item{border:1px solid #333;padding:5px;margin:3px 0;font-size:12px}
.small{font-size:11px;color:#aaa}
</style>
</head>
<body>
<div id="error"></div>
<h3>ORV: Tyrant King v5.3.9</h3>
<img id="portrait" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxMTEhUTExMWFhUXGB0YGBgYGBgYGBgYGBgYGBgYFxgYHSggGBolGxUVITEhJSkrLi4uFx8zODMtNygtLisBCgoKDg0OGxAQGy0lHyUtLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLf/AABEIALcBEwMBIgACEQEDEQH/xAAcAAABBQEBAQAAAAAAAAAAAAAAAQIDBAUGBwj/xABCEAABAwEFBQUFBQYFBQAAAAABAAIRAwQFEiExQVEGEyJhcYEUMoGRoRQjQrHB0fAUI2Jy4RUkM0OCkqLxFTSCotLh8CU0Nf/EABQBAQAAAAAAAAAAAAAAAAAAAAD/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwD3iiigAooooA//2Q==">
<div class="card">
<b>Yuki Amatsu</b><br>
<span class="small">Level <span id="lv">1</span> | Incarnation | Regression: <span id="reg">1</span>st</span>
<div class="stats">
<div>HP: <span id="hp">100</span>/<span id="mhp">100</span></div>
<div>Coins: <span id="c">0</span></div>
<div>STR: <span id="str">1</span></div>
<div>EXP: <span id="xp">0</span>/<span id="xm">100</span></div>
</div>
<button id="newBtn">New Game</button>
<button id="loadBtn">Load Game</button>
<div class="tabs">
<div class="tab active" data-tab="story">Story</div>
<div class="tab" data-tab="combat">Combat</div>
<div class="tab" data-tab="up">Upgrades</div>
<div class="tab" data-tab="inv">Inventory</div>
<div class="tab" data-tab="shop">Shop</div>
<div class="tab" data-tab="fable">Fables</div>
</div>
<div id="story" class="panel active">
<div class="log" id="log"></div>
<div id="choices"></div>
</div>
<div id="combat" class="panel"><div class="log" id="combatlog"></div><div id="combatchoices"></div></div>
<div id="up" class="panel"><div id="uplist"></div></div>
<div id="inv" class="panel"><div id="invlist"></div></div>
<div id="shop" class="panel"><div id="shoplist"></div></div>
<div id="fable" class="panel"><div id="fablelist"></div></div>
<script>
window.onerror = function(m, u, l) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').innerText = 'JS ERROR: ' + m + ' Line: ' + l;
};

let g = {hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},enemy:null,reg:1};

function log(t) {
  let l = document.getElementById('log');
  l.innerText += t + '\n';
  l.scrollTop = l.scrollHeight;
}

function update() {
  document.getElementById('hp').innerText = g.hp;
  document.getElementById('mhp').innerText = g.mhp;
  document.getElementById('c').innerText = g.c;
  document.getElementById('str').innerText = g.str + (g.eq.w? g.eq.w.s : 0);
  document.getElementById('lv').innerText = g.lv;
  document.getElementById('xp').innerText = g.xp;
  document.getElementById('xm').innerText = g.xm;
  document.getElementById('reg').innerText = g.reg;
}

function newGame() {
  g = {hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},enemy:null,reg:1};
  log('=== NEW GAME STARTED ===\nYou are Yuki Amatsu, Incarnation.\n\n=== SCENARIO #1: SUBWAY ===\nThe lights die. Blue message:\n[Main Scenario #1 – Prove Your Worth]\nKill 1 living being. Reward: 500 Coins\n\nA thug with a box cutter approaches.');
  document.getElementById('choices').innerHTML = '<button id="fightBtn">[1] Charge the thug – Fight</button>';
  document.getElementById('fightBtn').onclick = function() {
    g.enemy = {n:'Subway Thug',hp:5,str:2,r:500,e:50};
    document.querySelector('[data-tab="combat"]').click();
    document.getElementById('combatlog').innerText = '\n--- COMBAT: Subway Thug ---\n';
    document.getElementById('combatchoices').innerHTML = '<button id="atkBtn">Attack</button>';
    document.getElementById('atkBtn').onclick = attack;
  };
  update();
}

function attack() {
  let dmg = g.str + (g.eq.w? g.eq.w.s : 0);
  g.enemy.hp -= dmg;
  let cl = document.getElementById('combatlog');
  cl.innerText += `You deal ${dmg} damage.\n`;
  if (g.enemy.hp <= 0) {
    cl.innerText += `${g.enemy.n} defeated! +${g.enemy.r}c +${g.enemy.e}XP\n`;
    g.c += g.enemy.r; g.xp += g.enemy.e; g.cl = 1; g.enemy = null;
    update();
    log('\nThe thug collapses. +500 coins. +50 EXP.\nYou win! Scenario 2 coming next update.');
    document.getElementById('combatchoices').innerHTML = '';
    return;
  }
  g.hp -= g.enemy.str;
  cl.innerText += `${g.enemy.n} deals ${g.enemy.str} damage.\n`;
  if (g.hp <= 0) {
    cl.innerText += 'YOU DIED. Regression +1.\n';
    g.reg++; g.hp = g.mhp; g.enemy = null;
  }
  update();
}

document.getElementById('newBtn').onclick = newGame;
document.getElementById('loadBtn').onclick = function(){log('Load not in v5.3.9');};
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = function() {
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));
    this.classList.add('active');
    document.getElementById(this.dataset.tab).classList.add('active');
  };
});

log('v5.3.9 ready. Tap New Game.');
update();
</script>
</body>
</html>
