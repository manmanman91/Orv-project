<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ORV v5.2.3</title><style>body{background:#0d0d1a;color:#eee;font-family:monospace;padding:8px;max-width:375px}h3{margin:5px 0}button{background:#FFD700;color:#000;border:none;padding:10px;margin:4px 0;width:100%;font-size:15px}button:disabled{background:#444;color:#888}.log{border:1px solid #444;padding:8px;height:280px;overflow:auto;white-space:pre-wrap;font-size:13px;margin:8px 0}.stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:13px}.row{display:flex;gap:4px}.row button{flex:1}.tab{background:#2a2a3e;border:1px solid #444;padding:6px;margin:2px;text-align:center}.tab.active{background:#FFD700;color:#000}.panel{display:none}.panel.active{display:block}.item{border:1px solid #333;padding:5px;margin:3px 0;font-size:13px}</style></head><body><h3>ORV: Tyrant King v5.2.3</h3><div class="stats"><div>HP: <span id="hp">100</span>/100</div><div>Coins: <span id="c">0</span></div><div>STR: <span id="str">1</span></div><div>Level: <span id="lv">1</span></div></div><div class="row"><div class="tab active" onclick="tab('story',this)">Story</div><div class="tab" onclick="tab('inv',this)">Inventory</div><div class="tab" onclick="tab('shop',this)">Shop</div></div><div id="story" class="panel active"><div class="log" id="log"></div><div id="choices"></div></div><div id="inv" class="panel"><div id="invlist"></div></div><div id="shop" class="panel"><div id="shoplist"></div></div><script>let g={hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},rel:{yerin:0,arin:0},f:[],enemy:null};const log=t=>{let l=document.getElementById('log');l.innerText+=t+'\n';l.scrollTop=l.scrollHeight},update=()=>{hp.innerText=g.hp;c.innerText=g.c;str.innerText=g.str+(g.eq.w?g.eq.w.s:0);lv.innerText=g.lv;renderInv();renderShop()},save=()=>localStorage.setItem('orv523',JSON.stringify(g)),load=()=>{let d=localStorage.getItem('orv523');if(d){g=JSON.parse(d);log('Loaded save.');update();showScenario()}else{log('No save found. Tap New Game.')}},tab=(id,el)=>{document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));el.classList.add('active');document.getElementById(id).classList.add('active')},choices=(...btns)=>{let d=document.getElementById('choices');d.innerHTML='';btns.forEach(b=>{let el=document.createElement('button');el.innerText=b.t;el.onclick=b.f;if(b.dis)el.disabled=true;d.appendChild(el)})},showScenario=()=>{if(g.sc==1&&g.cl==0){log('\n=== SCENARIO #1: SUBWAY ===\nThe lights die. A blue message appears:\n[Main Scenario #1 – Prove Your Worth]\nKill 1 living being. Reward: 500 Coins\n\nA thug with a box cutter approaches.\nSeo Yerin hides behind you.');choices({t:'[1] Charge the thug – Fight',f:()=>startCombat({n:'Subway Thug',hp:5,str:2})},{t:'[2] [INT 1] Look for weapon',f:()=>{g.inv.push({id:'pipe',n:'Rusted Pipe',s:2,c:25});log('Found Rusted Pipe! +2 STR.');save();startCombat({n:'Subway Thug',hp:5,str:2})}},{t:'[3] Talk to Seo Yerin',f:()=>{g.rel.yerin=1;log('Seo Yerin: "P-please help..." [+1 Relationship]');save();startCombat({n:'Subway Thug',hp:5,str:2})}})}else if(g.sc==1&&g.cl==1){log('\nThe thug collapses. +500 coins. +50 EXP.\n[Fable Unlocked: One Who Killed a Human]');g.f.push('One Who Killed a Human');choices({t:'Continue to Scenario #2',f:()=>{g.sc=2;save();showScenario()}})}else if(g.sc==2&&g.cl==1){log('\n=== SCENARIO #2: PLATFORM CLEAR ===\nA slime blocks the stairs.\n\nArin Kosaka drops from the vent. "Dumbass. You almost got dissolved."');choices({t:'[1] "You\'re welcome." - Arin -1',f:()=>{g.rel.arin=-1;startCombat({n:'Subway Slime',hp:15,str:3})}},{t:'[2] [INT 2] "You were scouting." - Arin +2',f:()=>{if(g.int>=2){g.rel.arin=2;log('Arin: "...Tch. Fine. Vents lead to S3." [+2 Relationship]')}else{log('INT too low.');g.rel.arin=-1}startCombat({n:'Subway Slime',hp:15,str:3})}},{t:'[3] [Gift] Give Bandage - Arin +3',f:()=>{let i=g.inv.findIndex(x=>x.id=='bandage');if(i>-1){g.inv.splice(i,1);g.rel.arin=3;if(!g.f.includes('First Ally'))g.f.push('First Ally');log('Arin: "...You didn\'t have to." [+3 Relationship] [Fable: First Ally]')}else{log('No Bandage to gift!');g.rel.arin=-1}save();startCombat({n:'Subway Slime',hp:15,str:3})}})}else if(g.sc==2&&g.cl==2){log('\nThe slime bursts. +300 coins. +75 EXP.');choices({t:'Continue',f:()=>{g.sc=3;log('S3 not implemented yet. You win for now!');save()}})}},startCombat=e=>{g.enemy=e;log(`\n--- COMBAT: ${e.n} ---`);log(`${e.n} HP: ${e.hp} | Your HP: ${g.hp}`);choices({t:'Attack',f:attack},{t:'Use Item',f:()=>tab('inv',document.querySelectorAll('.tab')[1])})},attack=()=>{let dmg=g.str+(g.eq.w?g.eq.w.s:0);g.enemy.hp-=dmg;log(`You deal ${dmg} damage. ${g.enemy.n} HP: ${g.enemy.hp}`);if(g.enemy.hp<=0){log(`${g.enemy.n} defeated! +${g.enemy.n=='Subway Thug'?500:300} coins. +${g.enemy.n=='Subway Thug'?50:75} EXP.`);g.c+=g.enemy.n=='Subway Thug'?500:300;g.xp+=g.enemy.n=='Subway Thug'?50:75;g.cl=g.sc;if(g.xp>=g.xm){g.lv++;g.str++;g.agi++;g.int++;g.vit++;g.mhp+=10;g.hp=g.mhp;g.xp=0;g.xm=g.lv*100;log('LEVEL UP! All stats +1')}g.enemy=null;save();update();showScenario();return}let edmg=g.enemy.str;g.hp-=edmg;log(`${g.enemy.n} deals ${edmg} damage. Your HP: ${g.hp}`);if(g.hp<=0){log('YOU DIED. Lost 50% coins. Regression +1.');g.c=Math.floor(g.c*0.5);g.hp=g.mhp;g.str=g.agi=g.int=g.vit=1;g.sc=1;g.cl=0;g.inv=[];g.eq={w:null};g.enemy=null;save()}update()},renderInv=()=>{let h='<b>Equipped:</b><br>';h+=g.eq.w?`<div class="item">${g.eq.w.n} +${g.eq.w.s} STR <button onclick="unequip()">Unequip</button></div>`:'<div class="item">Fists</div>';h+='<br><b>Bag:</b><br>';g.inv.forEach((it,i)=>{h+=`<div class="item">${it.n} ${it.id=='bandage'?'+15 HP':'+'+it.s+' STR'}<div class="row"><button onclick="useItem(${i})">Use</button><button onclick="sellItem(${i})">Sell ${Math.floor(it.c*0.5)}c</button>${g.sc==2&&g.rel.arin<5?`<button onclick="giftItem(${i})">Gift</button>`:''}</div></div>`});document.getElementById('invlist').innerHTML=h||'Empty'},unequip=()=>{if(g.eq.w){g.inv.push(g.eq.w);g.eq.w=null;save();update()}},useItem=i=>{let it=g.inv[i];if(it.id=='bandage'){g.hp=Math.min(g.mhp,g.hp+15);g.inv.splice(i,1);log('Used Bandage. +15 HP.')}else{if(g.eq.w)g.inv.push(g.eq.w);g.eq.w=it;g.inv.splice(i,1);log(`Equipped ${it.n}.`)}save();update();if(g.enemy)startCombat(g.enemy)},sellItem=i=>{let it=g.inv[i];g.c+=Math.floor(it.c*0.5);g.inv.splice(i,1);log(`Sold ${it.n} for ${Math.floor(it.c*0.5)}c.`);save();update()},giftItem=i=>{g.inv.splice(i,1);g.rel.arin+=2;if(!g.f.includes('First Ally'))g.f.push('First Ally');log('Gifted item to Arin. [+2 Relationship] [Fable: First Ally]');save();update()},renderShop=()=>{let stock=g.cl==1?[{id:'dagger',n:'Iron Dagger',s:2,c:200,q:1},{id:'bandage',n:'Bandage',s:0,c:30,q:3}]:[];let h=`<b>Coins: ${g.c}</b><br><b>S${g.cl} Stock:</b><br>`;stock.forEach((it,i)=>{h+=`<div class="item">${it.n} ${it.s?'+'+it.s+' STR':'+15 HP'} - ${it.c}c [${it.q}/1]<button onclick="buy(${g.cl},${i})" ${g.c<it.c||it.q==0?'disabled':''}>Buy</button></div>`});document.getElementById('shoplist').innerHTML=h||'Clear a scenario to unlock shop.'},buy=(s,i)=>{let stock={1:[{id:'dagger',n:'Iron Dagger',s:2,c:200,q:1},{id:'bandage',n:'Bandage',s:0,c:30,q:3}]}[s];let it=stock[i];if(g.c>=it.c&&it.q>0){g.c-=it.c;it.q--;g.inv.push(it);log(`Bought ${it.n}.`);save();update();renderShop()}};log('v5.2.3 ready.');update();load();</script></body></html>
