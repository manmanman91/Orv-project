<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ORV v5.4.5</title><style>body{background:#0d1a;color:#eee;font-family:monospace;padding:6px;max-width:375px;margin:0 auto}#portrait{width:100%;border:2px solid #FFD700;margin-bottom:6px;display:block}.card{border:2px solid #FFD700;padding:10px;text-align:center;margin-bottom:6px;background:#1a1a2e}h3{margin:4px 0;font-size:16px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;margin:4px 0}button{background:#FFD700;color:#000;border:none;padding:10px;margin:3px 0;width:100%;font-size:14px}button:disabled{background:#444;color:#888}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin:6px 0}.tab{background:#2a3e;border:1px solid #444;padding:7px;text-align:center;font-size:12px}.tab.active{background:#FFD700;color:#000}.panel{display:none;min-height:280px}.panel.active{display:block}.log{border:1px solid #444;padding:6px;height:240px;overflow:auto;white-space:pre-wrap;font-size:12px;margin:6px 0}.row{display:flex;gap:3px}.row button{flex:1}.item{border:1px solid #333;padding:5px;margin:3px 0;font-size:12px}.small{font-size:11px;color:#aaa}.fable{border:1px solid #FFD700;padding:6px;margin:4px 0;background:#1a2e}.fable b{color:#FFD700}.buff{color:#0f0;font-size:11px}#error{color:#f00;padding:10px;border:1px solid #f00;margin:6px 0;display:none}</style></head><body><div id="error"></div><h3>ORV: Tyrant King v5.4.5</h3><img id="portrait" src="./portrait.PNG" onerror="document.getElementById('error').style.display='block';document.getElementById('error').innerText='ERROR: portrait.PNG not found in repo root.'"><div class="card" id="card"><b>Yuki Amatsu</b><br><span class="small">Level <span id="lv">1</span> | Incarnation | Regression: <span id="reg">1</span>st</span><div class="stats"><div>HP: <span id="hp">100</span>/<span id="mhp">100</span></div><div>Coins: <span id="c">0</span></div><div>STR: <span id="str">1</span> <span id="fablestr" class="buff"></span></div><div>EXP: <span id="xp">0</span>/<span id="xm">100</span></div></div></div><button id="newBtn">New Game</button><button id="loadBtn">Load Game</button><div class="tabs"><div class="tab active" data-tab="story">Story</div><div class="tab" data-tab="combat">Combat</div><div class="tab" data-tab="up">Upgrades</div><div class="tab" data-tab="inv">Inventory</div><div class="tab" data-tab="shop">Shop</div><div class="tab" data-tab="fable">Fables</div></div><div id="story" class="panel active"><div class="log" id="log"></div><div id="choices"></div></div><div id="combat" class="panel"><div class="log" id="combatlog"></div><div id="combatchoices"></div></div><div id="up" class="panel"><div id="uplist"></div></div><div id="inv" class="panel"><div id="invlist"></div></div><div id="shop" class="panel"><div id="shoplist"></div></div><div id="fable" class="panel"><div id="fablelist"></div></div><script>
window.onerror=function(m){document.getElementById('error').style.display='block';document.getElementById('error').innerText='JS ERROR: '+m};
const FABLE_BUFFS={'One Who Killed a Human':{str:2,desc:'+2 STR. You crossed the line.'},'First Ally':{mhp:20,desc:'+20 Max HP. Trust is armor.'}};
let g={hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},rel:{yerin:0,arin:0},f:[],sk:[],enemy:null,reg:1};
function getBuff(s){let b={str:0,agi:0,int:0,vit:0,mhp:0};g.f.forEach(f=>{let fb=FABLE_BUFFS[f];if(fb){for(let k in fb)if(k!='desc')b[k]=(b[k]||0)+fb[k]}});return b[s]||0}
function log(t,p='log'){let l=document.getElementById(p);l.innerText+=t+'\n';l.scrollTop=l.scrollHeight}
function update(){let b=getBuff('str'),bm=getBuff('mhp');hp.innerText=g.hp;mhp.innerText=g.mhp+bm;c.innerText=g.c;str.innerText=g.str+(g.eq.w?g.eq.w.s:0);fablestr.innerText=b?`+${b}`:'';lv.innerText=g.lv;xp.innerText=g.xp;xm.innerText=g.xm;reg.innerText=g.reg;renderUp();renderInv();renderShop();renderFable()}
function save(){localStorage.setItem('orv545',JSON.stringify(g))}
function loadGame(){let d=localStorage.getItem('orv545');if(d){g=JSON.parse(d);log('Save loaded.');update();showScenario()}else{log('No save found. Tap New Game.')}}
function newGame(){g={hp:100,mhp:100,str:1,agi:1,int:1,vit:1,c:0,lv:1,xp:0,xm:100,sc:1,cl:0,inv:[],eq:{w:null},rel:{yerin:0,arin:0},f:[],sk:[],enemy:null,reg:1};log('=== NEW GAME STARTED ===\nYou are Yuki Amatsu, Incarnation.');save();update();showScenario()}
function choices(...btns){let d=document.getElementById('choices');d.innerHTML='';btns.forEach(b=>{let el=document.createElement('button');el.innerText=b.t;el.onclick=b.f;if(b.dis)el.disabled=true;d.appendChild(el)})}
function showScenario(){document.getElementById('combatlog').innerText='';if(g.sc==1&&g.cl==0){log('\n=== SCENARIO #1: SUBWAY ===\nThe lights die. Blue message:\n[Main Scenario #1 – Prove Your Worth]\nKill 1 living being. Reward: 500 Coins\nA thug with a box cutter approaches.\nSeo Yerin hides behind you.');choices({t:'[1] Charge the thug – Fight',f:()=>startCombat({n:'Subway Thug',hp:5,str:2,r:500,e:50})},{t:'[2] [INT 1] Look for weapon',f:()=>{g.inv.push({id:'pipe',n:'Rusted Pipe',s:2,c:25});log('Found Rusted Pipe! +2 STR auto-equipped.');g.eq.w=g.inv.pop();save();update();startCombat({n:'Subway Thug',hp:5,str:2})}},{t:'[3] Talk to Seo Yerin',f:()=>{g.rel.yerin=1;log('Seo Yerin: "P-please help..." [+1 Relationship]');save();update();startCombat({n:'Subway Thug',hp:5,str:2})}})}else if(g.sc==1&&g.cl==1){log('\nThe thug collapses. +500 coins. +50 EXP.\n[Fable Unlocked: One Who Killed a Human] +2 STR');if(!g.f.includes('One Who Killed a Human'))g.f.push('One Who Killed a Human');choices({t:'Continue to Scenario #2',f:()=>{g.sc=2;g.cl=1;save();update();showScenario()}})}else if(g.sc==2&&g.cl==1){log('\n=== SCENARIO #2: PLATFORM CLEAR ===\nA slime blocks the stairs.\n\nArin Kosaka drops from the vent. "Dumbass. You almost got dissolved."');choices({t:'[1] "You\'re welcome." – Arin -1',f:()=>{g.rel.arin=-1;startCombat({n:'Subway Slime',hp:15,str:3,r:300,e:75})}},{t:'[2] [INT 2] "You were scouting." – Arin +2',f:()=>{if(g.int>=2){g.rel.arin=2;log('Arin: "...Tch. Fine. Vents lead to S3." [+2 Relationship]')}else{log('INT too low.');g.rel.arin=-1}save();update();startCombat({n:'Subway Slime',hp:15,str:3})}},{t:'[3] Gift Bandage – Arin +3',f:()=>{let i=g.inv.findIndex(x=>x.id=='bandage');if(i>-1){g.inv.splice(i,1);g.rel.arin=3;if(!g.f.includes('First Ally'))g.f.push('First Ally');log('Arin: "...You didn\'t have to." [+3 Relationship] [Fable: First Ally] +20 Max HP')}else{log('No Bandage to gift!');g.rel.arin=-1}save();update();startCombat({n:'Subway Slime',hp:15,str:3})}})}else if(g.sc==2&&g.cl==2){log('\nThe slime bursts. +300 coins. +75 EXP.\nS3 coming soon!');choices({t:'New Game+',f:()=>newGame()})}}
function startCombat(e){g.enemy=e;document.querySelector('.tab[data-tab="combat"]').click();log(`\n--- COMBAT: ${e.n} ---`,'combatlog');combatLoop()}
function combatLoop(){if(!g.enemy)return showScenario();let l=document.getElementById('combatlog');l.innerText+=`${g.enemy.n} HP: ${g.enemy.hp} | Your HP: ${g.hp}\n`;let d=document.getElementById('combatchoices');d.innerHTML='';[{t:'Attack',f:attack},{t:'Use Item',f:()=>document.querySelector('.tab[data-tab="inv"]').click()},{t:'Flee',f:flee}].forEach(b=>{let el=document.createElement('button');el.innerText=b.t;el.onclick=b.f;d.appendChild(el)})}
function attack(){let b=getBuff('str'),bm=getBuff('mhp');let dmg=g.str+(g.eq.w?g.eq.w.s:0)+b+(window.pStrike?Math.floor(g.str*0.5):0);window.pStrike=0;g.enemy.hp-=dmg;log(`You deal ${dmg} damage.`,'combatlog');if(g.enemy.hp<=0){log(`${g.enemy.n} defeated! +${g.enemy.r}c +${g.enemy.e}XP`,'combatlog');g.c+=g.enemy.r;g.xp+=g.enemy.e;g.cl++;if(g.xp>=g.xm){g.lv++;g.str++;g.agi++;g.int++;g.vit++;g.mhp+=10;g.hp=g.mhp+bm;g.xp=0;g.xm=g.lv*100;log('LEVEL UP! All stats +1','combatlog')}g.enemy=null;save();update();setTimeout(()=>{document.querySelector('.tab[data-tab="story"]').click();showScenario()},1000);return}let edmg=g.enemy.str;g.hp-=edmg;log(`${g.enemy.n} deals ${edmg} damage.`,'combatlog');if(g.hp<=0){log('YOU DIED. Lost 50% coins. Regression +1.','combatlog');g.c=Math.floor(g.c*0.5);g.hp=g.mhp=100;g.str=g.agi=g.int=g.vit=1;g.sc=1;g.cl=0;g.inv=[];g.eq={w:null};g.enemy=null;g.reg++;save();update();setTimeout(()=>{document.querySelector('.tab[data-tab="story"]').click();showScenario()},1500);return}update()}
function flee(){log('You fled combat. -50 coins penalty.','combatlog');g.c=Math.max(0,g.c-50);g.enemy=null;save();update();document.querySelector('.tab[data-tab="story"]').click();showScenario()}
function renderUp(){let cap=g.sc*5;let h='';['str','agi','int','vit'].forEach(s=>{let cost=100*Math.pow(2,g[s]-1);let max=g[s]>=cap;let b=getBuff(s);h+=`<div class="item">${s.toUpperCase()} ${g[s]}/${cap} ${b?`<span class="buff">+${b}</span>`:''}<br><button onclick="upgrade('${s}')" ${g.c<cost||max?'disabled':''}>Upgrade +1 (${cost}c)</button></div>`});document.getElementById('uplist').innerHTML=h}
function upgrade(s){let cost=100*Math.pow(2,g[s]-1);if(g.c>=cost){g.c-=cost;g[s]++;if(s=='vit')g.mhp+=10;log(`Upgraded ${s.toUpperCase()}.`);save();update()}}
function renderInv(){let h='<b>Equipped:</b><br>';h+=g.eq.w?`<div class="item">${g.eq.w.n} +${g.eq.w.s} STR <button onclick="unequip()">Unequip</button></div>`:'<div class="item">Fists</div>';h+='<br><b>Bag:</b><br>';g.inv.forEach((it,i)=>{h+=`<div class="item">${it.n} ${it.id=='bandage'?'+15 HP':'+'+it.s+' STR'}<div class="row"><button onclick="useItem(${i})">Use</button><button onclick="sellItem(${i})">Sell ${Math.floor(it.c*0.5)}c</button>${g.sc==2&&g.rel.arin<5?`<button onclick="giftItem(${i})">Gift</button>`:''}</div></div>`});document.getElementById('invlist').innerHTML=h||'Empty'}
function unequip(){if(g.eq.w){g.inv.push(g.eq.w);g.eq.w=null;save();update()}}
function useItem(i){let it=g.inv[i],bm=getBuff('mhp');if(it.id=='bandage'){g.hp=Math.min(g.mhp+bm,g.hp+15);g.inv.splice(i,1);log('Used Bandage. +15 HP.')}else{if(g.eq.w)g.inv.push(g.eq.w);g.eq.w=it;g.inv.splice(i,1);log(`Equipped ${it.n}.`)}save();update();if(g.enemy)combatLoop()}
function sellItem(i){let it=g.inv[i];g.c+=Math.floor(it.c*0.5);g.inv.splice(i,1);log(`Sold ${it.n} for ${Math.floor(it.c*0.5)}c.`);save();update()}
function giftItem(i){g.inv.splice(i,1);g.rel.arin+=2;if(!g.f.includes('First Ally'))g.f.push('First Ally');log('Gifted item to Arin. [+2 Relationship] [Fable: First Ally] +20 Max HP');save();update()}
function renderShop(){let stock=g.cl>=1?[{id:'dagger',n:'Iron Dagger',s:2,c:200,q:1},{id:'bandage',n:'Bandage',s:0,c:30,q:3},{id:'strike',n:'Power Strike',s:0,c:150,q:1,skill:1}]:[];let h=`<b>Coins: ${g.c}</b><br><b>S${g.cl} Black Market:</b><br>`;stock.forEach((it,i)=>{h+=`<div class="item">${it.n} ${it.s?'+'+it.s+' STR':it.skill?'150% dmg 1/combat':'+15 HP'} - ${it.c}c [${it.q}/1]<button onclick="buy(${i})" ${g.c<it.c||it.q==0?'disabled':''}>Buy</button></div>`});document.getElementById('shoplist').innerHTML=h||'Clear Scenario 1 to unlock shop.'}
function buy(i){let stock=[{id:'dagger',n:'Iron Dagger',s:2,c:200,q:1},{id:'bandage',n:'Bandage',s:0,c:30,q:3},{id:'strike',n:'Power Strike',s:0,c:150,q:1,skill:1}];let it=stock[i];if(g.c>=it.c&&it.q>0){g.c-=it.c;it.q--;if(it.skill){g.sk.push('Power Strike');log('Learned Power Strike! Use in combat.')}else{g.inv.push(it);log(`Bought ${it.n}.`)}save();update();renderShop()}}
function renderFable(){let h='<b>Unlocked Fables:</b><br>';if(g.f.length==0)h+='<div class="small">No fables recorded. Your actions will forge them.</div>';g.f.forEach(f=>{let fb=FABLE_BUFFS[f];h+=`<div class="fable"><b>[Fable: ${f}]</b><br><span class="buff">${fb.desc}</span></div>`});h+='<br><b>Relationships:</b><br>';h+=`<div class="item">Seo Yerin: ${g.rel.yerin}/5</div>`;h+=`<div class="item">Arin Kosaka: ${g.rel.arin}/5</div>`;document.getElementById('fablelist').innerHTML=h}
function dev(){if(++window.dc>=5){window.dc=0;alert(JSON.stringify({lv:g.lv,sc:g.sc,cl:g.cl,c:g.c,f:g.f,rel:g.rel,reg:g.reg},null,2))}}
window.dc=0;document.getElementById('newBtn').addEventListener('click',newGame);document.getElementById('loadBtn').addEventListener('click',loadGame);document.getElementById('card').addEventListener('click',dev);document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));this.classList.add('active');document.getElementById(this.dataset.tab).classList.add('active')})});log('v5.4.5 ready.');update();loadGame();</script></body></html>
