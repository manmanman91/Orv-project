<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ORV Test</title>
<style>
body{background:#111;color:#fff;font-family:monospace;padding:10px}
button{background:#FFD700;color:#000;border:none;padding:12px;margin:5px 0;width:100%;font-size:16px}
#log{border:1px solid #444;padding:8px;height:300px;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<h3>ORV: Tyrant King v5.2.2</h3>
<div id="log">Game loaded successfully.</div>
<button onclick="newGame()">New Game</button>
<button onclick="loadGame()">Load Game</button>
<script>
let g={n:"Yuki Amatsu",lv:1,hp:100,c:0,sc:1};
function log(t){document.getElementById('log').innerText+= '\n'+t}
function save(){localStorage.setItem('orv',JSON.stringify(g));log('Saved.')}
function loadGame(){let d=localStorage.getItem('orv');if(d){g=JSON.parse(d);log('Loaded: Lv'+g.lv+' HP:'+g.hp+' Coins:'+g.c)}else{log('No save found.')}}
function newGame(){g={n:"Yuki Amatsu",lv:1,hp:100,c:0,sc:1};log('New Game Started.\nYou are Yuki Amatsu, Incarnation.\n\nScenario #1: Subway\nA thug with a box cutter approaches.\nSeo Yerin hides behind you.\n\n[1] Fight\n[2] Run\n[3] Talk');save()}
log('v5.2.2 ready. Tap New Game.');
</script>
</body>
</html>
